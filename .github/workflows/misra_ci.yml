name: MISRA Compliance CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  misra-check:
    name: Build + MISRA Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools & cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake gcc cppcheck

      - name: CMake Configure
        run: |
          mkdir -p build
          cd build
          cmake ..

      - name: CMake Build
        run: cmake --build build --parallel $(nproc)

      - name: Run MISRA Analysis
        run: |
          mkdir -p reports
          cppcheck --enable=all --inconclusive --suppress=missingIncludeSystem src/ 2> reports/misra_report.txt || true
          echo "MISRA analysis completed"

      - name: Upload MISRA Report
        uses: actions/upload-artifact@v4
        with:
          name: misra-report
          path: reports/
          if-no-files-found: warn

  send-email:
    name: Send Email Notification
    runs-on: ubuntu-latest
    needs: misra-check
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    
    steps:
      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: misra-report
          path: ./reports

      - name: Send email via EmailJS
        env:
          SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}
          USER_ID: ${{ secrets.EMAILJS_USER_ID }}
          TO_EMAIL: ${{ secrets.EMAILJS_RECIPIENT }}
        run: |
          # Count violations
          if [ -f reports/misra_report.txt ]; then
            VIOLATIONS=$(wc -l < reports/misra_report.txt)
          else
            VIOLATIONS="0"
          fi
          
          # Send email
          curl -X POST https://api.emailjs.com/api/v1.0/email/send \
            -H 'Content-Type: application/json' \
            -d "{
              \"service_id\": \"${SERVICE_ID}\",
              \"template_id\": \"${TEMPLATE_ID}\",
              \"user_id\": \"${USER_ID}\",
              \"template_params\": {
                \"to_email\": \"${TO_EMAIL}\",
                \"status\": \"MISRA Check Complete\",
                \"violations\": \"${VIOLATIONS}\",
                \"repo\": \"${{ github.repository }}\",
                \"commit\": \"${{ github.sha }}\",
                \"branch\": \"${{ github.ref_name }}\",
                \"run_link\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }
            }"
          
          echo "Email sent to ${TO_EMAIL}"
